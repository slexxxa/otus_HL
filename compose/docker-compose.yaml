version: "3.9"

services:
    main:
        image: docker.io/slexxa/otus_hl_main:v0.0.10
        container_name: main
        restart: unless-stopped
        environment:
          PGHOST_WRITE: "haproxy"
          PGPORT_WRITE: "5000"
          PGHOST_READ: "haproxy"
          PGPORT_READ: "5001"
          PGUSER: "postgres"
          PGPASSWORD: "postgres"
          PGDBNAME: "auth"
          REDISCONN: "redis:6379"

        ports:
          - "8000:8000"
    mesenger:
        image: docker.io/slexxa/otus_hl_mesenger:v0.0.3
        container_name: mesenger
        restart: unless-stopped
        environment:
          PGHOST_WRITE: "haproxy"
          PGPORT_WRITE: "5000"
          PGHOST_READ: "haproxy"
          PGPORT_READ: "5001"
          PGUSER: "postgres"
          PGPASSWORD: "postgres"
          PGDBNAME: "auth"
          REDISCONN: "redis:6379"

        ports:
          - "8001:8080"

    kafka:
      image: bitnamilegacy/kafka:4.0.0-debian-12-r10
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        - KAFKA_CFG_NODE_ID=0
        - KAFKA_CFG_PROCESS_ROLES=broker,controller
        - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
        - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
        - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
        - ALLOW_PLAINTEXT_LISTENER=yes
        - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

    redis:
        image: redis:6.2.6-alpine
        container_name: redis
        ports:
          - "6379:6379"
        volumes:
          - redis-data:/data

    etcd1: &etcd
        image: docker.io/slexxa/patroni-citus:v260417
        environment:
            ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
            ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
            ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
            ETCD_INITIAL_CLUSTER_STATE: new
            ETCD_INITIAL_CLUSTER_TOKEN: tutorial
            ETCD_UNSUPPORTED_ARCH: arm64
        container_name: etcd1
        hostname: etcd1
        command: etcd --name etcd1 --initial-advertise-peer-urls http://etcd1:2380

    etcd2:
        <<: *etcd
        container_name: etcd2
        hostname: etcd2
        command: etcd --name etcd2 --initial-advertise-peer-urls http://etcd2:2380

    etcd3:
        <<: *etcd
        container_name: etcd3
        hostname: etcd3
        command: etcd --name etcd3 --initial-advertise-peer-urls http://etcd3:2380

    haproxy:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: haproxy
        container_name: haproxy
        ports:
            - "5000:5000"
            - "5001:5001"
        command: haproxy
        environment: &haproxy_env
            ETCDCTL_ENDPOINTS: http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
            PATRONI_ETCD3_HOSTS: "'etcd1:2379','etcd2:2379','etcd3:2379'"
            PATRONI_CITUS_DATABASE: citus
            PATRONI_SCOPE: demo
            

    patroni-c1:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-c1
        container_name: patroni-c1
        volumes:
          - ./initdb/.pgpass:/home/postgres/.pgpass
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-c1
            PATRONI_CITUS_GROUP: 0

    patroni-c2:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-c2
        container_name: patroni-c2
        volumes:
          - ./initdb/.pgpass:/home/postgres/.pgpass
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-c2
            PATRONI_CITUS_GROUP: 0

    patroni-w1:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-w1
        container_name: patroni-w1
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-w1
            PATRONI_CITUS_GROUP: 1

    patroni-w2:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-w2
        container_name: patroni-w2
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-w2
            PATRONI_CITUS_GROUP: 1

    patroni-w3:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-w3
        container_name: patroni-w3
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-w3
            PATRONI_CITUS_GROUP: 2

    patroni-w4:
        image: docker.io/slexxa/patroni-citus:v260417
        env_file: patroni.env
        hostname: patroni-w4
        container_name: patroni-w4
        environment:
            <<: *haproxy_env
            PATRONI_NAME: patroni-w4
            PATRONI_CITUS_GROUP: 2

    migrate:
        image: postgres:17
        container_name: migrate
        depends_on:
          - patroni-c1
        volumes:
          - ./initdb:/initdb
          - ./people:/people
        entrypoint: ["/bin/bash", "/initdb/wait-and-init.sh"]
        restart: "no"
volumes:
  postgres_data:
  redis-data:
