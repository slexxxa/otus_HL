basePath: /
definitions:
  main.Body:
    properties:
      text:
        type: string
    type: object
  main.Message:
    properties:
      created_at:
        type: string
      from_user:
        type: string
      id:
        type: integer
      text:
        type: string
      to_user:
        type: string
    type: object
  main.Post:
    properties:
      created_at:
        type: string
      id:
        type: integer
      text:
        type: string
      username:
        type: string
    type: object
  main.User:
    properties:
      biography:
        example: Music, photo and popcorn
        type: string
      birthdate:
        example: 11-12-1988
        type: string
      city:
        example: SPB
        type: string
      email:
        example: test1@pupkin.ru
        type: string
      first_name:
        example: Aleksandr
        type: string
      gender:
        example: M
        type: string
      id:
        type: string
      password:
        example: test1
        type: string
      phone:
        example: "123456789"
        type: string
      second_name:
        example: Pupkin
        type: string
      username:
        example: test1
        type: string
    type: object
info:
  contact: {}
  description: Otus HighLoad
  title: Auth Service API
  version: "1.0"
paths:
  /:
    get:
      responses:
        "200":
          description: OK
      summary: Hello endpoint
      tags:
      - system
  /dialog/{user_id}/list:
    get:
      parameters:
      - description: User
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Message'
            type: array
      security:
      - BearerAuth: []
      summary: Get dialog
      tags:
      - dialog
  /dialog/{user_id}/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: Receiver
        in: path
        name: user_id
        required: true
        type: string
      - description: text
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/main.Body'
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Send message
      tags:
      - dialog
  /friend/delete:
    delete:
      parameters:
      - description: Friend user ID
        in: query
        name: user_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete friend
      tags:
      - friend
  /friend/set:
    post:
      parameters:
      - description: Friend user ID
        in: query
        name: user_id
        required: true
        type: string
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Add friend
      tags:
      - friend
  /health:
    get:
      responses:
        "200":
          description: OK
      summary: Health check
      tags:
      - system
  /login:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
      security:
      - BasicAuth: []
      summary: Login user
      tags:
      - auth
  /post/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: Post
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/main.Post'
      responses:
        "201":
          description: Created
      security:
      - BearerAuth: []
      summary: Create post
      tags:
      - post
  /post/delete:
    delete:
      parameters:
      - description: Post ID
        in: query
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete post
      tags:
      - post
  /post/feed:
    get:
      description: Returns paginated feed of posts from friends
      parameters:
      - description: Offset
        example: 0
        in: query
        name: offset
        type: integer
      - description: Limit
        example: 10
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.Post'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get user feed
      tags:
      - post
  /post/feed/posted:
    get:
      description: Use ws://host/post/feed/posted
      responses: {}
      summary: WebSocket endpoint for realtime posts
      tags:
      - websocket
  /post/get:
    get:
      parameters:
      - description: Post ID
        in: query
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Post'
      security:
      - BearerAuth: []
      summary: Get post
      tags:
      - post
  /post/update:
    put:
      consumes:
      - application/json
      parameters:
      - description: Post
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/main.Post'
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Update post
      tags:
      - post
  /user/delete/{username}:
    delete:
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - user
  /user/get/{username}:
    get:
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.User'
      security:
      - BearerAuth: []
      summary: Get user
      tags:
      - user
  /user/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: User
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/main.User'
      responses:
        "201":
          description: Created
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - user
  /user/search:
    get:
      parameters:
      - description: First name
        in: query
        name: first_name
        required: true
        type: string
      - description: Last name
        in: query
        name: last_name
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.User'
            type: array
      security:
      - BearerAuth: []
      summary: Search users
      tags:
      - user
securityDefinitions:
  BasicAuth:
    type: basic
  BearerAuth:
    in: header
    name: token
    type: apiKey
swagger: "2.0"
